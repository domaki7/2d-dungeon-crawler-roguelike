<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Staff thrust upward with glowing orb (back view) -->
  <rect x="12" y="0" width="2" height="1" fill="#FFD700"/>
  <rect x="11" y="0" width="1" height="1" fill="#FFEE88"/>
  <rect x="14" y="0" width="1" height="1" fill="#FFEE88"/>
  <rect x="13" y="1" width="1" height="1" fill="#DAA520"/>
  <rect x="12" y="1" width="1" height="1" fill="#FFD700"/>
  <rect x="13" y="2" width="1" height="6" fill="#4A3020"/>
  <!-- Magic glow particles -->
  <rect x="12" y="0" width="1" height="1" fill="#FFEE88"/>
  <rect x="14" y="1" width="1" height="1" fill="#FFD700"/>
  <!-- Hood back -->
  <rect x="6" y="0" width="4" height="1" fill="#7A1818"/>
  <rect x="5" y="1" width="6" height="1" fill="#7A1818"/>
  <rect x="4" y="2" width="8" height="5" fill="#7A1818"/>
  <rect x="5" y="2" width="6" height="4" fill="#8B2020"/>
  <!-- Hood bottom edge -->
  <rect x="5" y="7" width="6" height="1" fill="#6A1818"/>
  <!-- Robe body -->
  <rect x="5" y="8" width="6" height="2" fill="#8B2020"/>
  <rect x="6" y="8" width="4" height="2" fill="#A03030"/>
  <rect x="5" y="8" width="1" height="2" fill="#DAA520"/>
  <rect x="10" y="8" width="1" height="2" fill="#DAA520"/>
  <!-- Robe torso -->
  <rect x="5" y="10" width="6" height="8" fill="#8B2020"/>
  <rect x="6" y="10" width="4" height="8" fill="#A03030"/>
  <rect x="5" y="10" width="1" height="8" fill="#DAA520"/>
  <rect x="10" y="10" width="1" height="8" fill="#DAA520"/>
  <!-- Left arm -->
  <rect x="3" y="10" width="2" height="6" fill="#7A1818"/>
  <rect x="3" y="16" width="2" height="1" fill="#D4A878"/>
  <!-- Right arm (raised with staff) -->
  <rect x="11" y="4" width="2" height="5" fill="#7A1818"/>
  <rect x="12" y="4" width="1" height="1" fill="#D4A878"/>
  <!-- Robe bottom -->
  <rect x="5" y="18" width="6" height="1" fill="#B8860B"/>
  <rect x="4" y="19" width="8" height="8" fill="#6A1818"/>
  <rect x="5" y="19" width="6" height="8" fill="#7A1818"/>
  <rect x="7" y="20" width="1" height="6" fill="#6A1818"/>
  <!-- Gold hem -->
  <rect x="4" y="26" width="8" height="1" fill="#B8860B"/>
  <!-- Boots -->
  <rect x="4" y="27" width="4" height="4" fill="#2A2A3A"/>
  <rect x="8" y="27" width="4" height="4" fill="#2A2A3A"/>
  <rect x="4" y="31" width="4" height="1" fill="#1E1E28"/>
  <rect x="8" y="31" width="4" height="1" fill="#1E1E28"/>
</svg>