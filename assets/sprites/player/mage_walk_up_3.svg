<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Frame 3: Neutral (back view, mirror of frame 1) -->
  <!-- Hood top -->
  <rect x="5" y="0" width="6" height="1" fill="#7A1818"/>
  <rect x="4" y="1" width="8" height="1" fill="#7A1818"/>
  <rect x="4" y="2" width="8" height="3" fill="#8B2020"/>
  <!-- Hood back -->
  <rect x="4" y="5" width="8" height="2" fill="#7A1818"/>
  <rect x="5" y="7" width="6" height="1" fill="#7A1818"/>
  <rect x="5" y="8" width="6" height="1" fill="#6A1818"/>
  <!-- Gold collar -->
  <rect x="5" y="9" width="6" height="1" fill="#DAA520"/>
  <!-- Robe back -->
  <rect x="4" y="10" width="8" height="2" fill="#A03030"/>
  <rect x="5" y="12" width="6" height="4" fill="#8B2020"/>
  <rect x="6" y="12" width="4" height="4" fill="#7A1818"/>
  <rect x="7" y="10" width="2" height="6" fill="#B8860B"/>
  <!-- Sleeves neutral -->
  <rect x="2" y="10" width="3" height="1" fill="#8B2020"/>
  <rect x="2" y="11" width="3" height="2" fill="#7A1818"/>
  <rect x="2" y="13" width="2" height="1" fill="#7A1818"/>
  <rect x="2" y="14" width="2" height="1" fill="#D4A878"/>
  <rect x="11" y="10" width="3" height="1" fill="#8B2020"/>
  <rect x="11" y="11" width="3" height="2" fill="#7A1818"/>
  <rect x="12" y="13" width="2" height="1" fill="#7A1818"/>
  <rect x="12" y="14" width="2" height="1" fill="#D4A878"/>
  <!-- Robe lower -->
  <rect x="4" y="16" width="8" height="2" fill="#8B2020"/>
  <rect x="5" y="18" width="6" height="4" fill="#6A1818"/>
  <rect x="7" y="16" width="2" height="6" fill="#7A1818"/>
  <!-- Gold hem -->
  <rect x="5" y="22" width="6" height="1" fill="#DAA520"/>
  <!-- Robe bottom -->
  <rect x="4" y="23" width="8" height="4" fill="#6A1818"/>
  <rect x="4" y="27" width="8" height="1" fill="#B8860B"/>
  <!-- Feet (slightly offset from frame 1) -->
  <rect x="5" y="28" width="3" height="2" fill="#2A2A3A"/>
  <rect x="8" y="28" width="3" height="2" fill="#2A2A3A"/>
  <rect x="5" y="30" width="3" height="1" fill="#1E1E2E"/>
  <rect x="8" y="30" width="3" height="1" fill="#1E1E2E"/>
  <!-- Staff (slight sway) -->
  <rect x="13" y="1" width="1" height="15" fill="#4A3020"/>
  <rect x="14" y="3" width="1" height="11" fill="#3A2818"/>
  <rect x="12" y="0" width="3" height="1" fill="#DAA520"/>
  <rect x="13" y="0" width="1" height="1" fill="#FFD700"/>
  <rect x="12" y="1" width="3" height="1" fill="#FFD700"/>
  <rect x="13" y="1" width="1" height="1" fill="#FFEC80"/>
</svg>