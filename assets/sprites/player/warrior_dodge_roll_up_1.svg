<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Mid-roll - back view tucked ball -->
  <!-- Helmet -->
  <rect x="5" y="8" width="6" height="3" fill="#505064"/>
  <rect x="5" y="8" width="3" height="1" fill="#6E6E82"/>
  <rect x="5" y="10" width="6" height="1" fill="#3A3A4E"/>
  <!-- Armor body rolled (back) -->
  <rect x="4" y="11" width="8" height="5" fill="#5A5A6E"/>
  <rect x="5" y="13" width="6" height="2" fill="#1E3878"/>
  <rect x="6" y="13" width="4" height="2" fill="#2844A0"/>
  <!-- Arms wrapped -->
  <rect x="3" y="12" width="2" height="3" fill="#5A5A6E"/>
  <rect x="11" y="12" width="2" height="3" fill="#5A5A6E"/>
  <!-- Belt -->
  <rect x="4" y="16" width="8" height="1" fill="#7A5030"/>
  <!-- Legs tucked -->
  <rect x="4" y="17" width="4" height="4" fill="#4A4A5E"/>
  <rect x="7" y="17" width="4" height="4" fill="#4A4A5E"/>
  <!-- Boots -->
  <rect x="4" y="21" width="4" height="2" fill="#363646"/>
  <rect x="7" y="21" width="4" height="2" fill="#363646"/>
</svg>
