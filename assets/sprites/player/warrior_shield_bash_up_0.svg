<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Helmet from behind -->
  <rect x="6" y="1" width="4" height="1" fill="#505064"/>
  <rect x="5" y="2" width="6" height="1" fill="#505064"/>
  <rect x="4" y="3" width="8" height="5" fill="#505064"/>
  <rect x="5" y="8" width="6" height="1" fill="#505064"/>
  <rect x="5" y="3" width="3" height="1" fill="#6E6E82"/>
  <rect x="4" y="5" width="8" height="1" fill="#3A3A4E"/>
  <!-- Back of head/neck -->
  <rect x="6" y="9" width="4" height="2" fill="#D4A070"/>
  <!-- Armor body -->
  <rect x="5" y="11" width="6" height="8" fill="#5A5A6E"/>
  <rect x="6" y="14" width="4" height="4" fill="#1E3878"/>
  <rect x="7" y="14" width="2" height="4" fill="#2844A0"/>
  <!-- Arms holding shield above -->
  <rect x="2" y="5" width="3" height="1" fill="#8888A0"/>
  <rect x="2" y="6" width="3" height="5" fill="#5A5A6E"/>
  <rect x="2" y="11" width="2" height="1" fill="#D4A878"/>
  <rect x="11" y="5" width="3" height="1" fill="#8888A0"/>
  <rect x="11" y="6" width="3" height="5" fill="#5A5A6E"/>
  <rect x="12" y="11" width="2" height="1" fill="#D4A878"/>
  <!-- Shield held above/in front (away from camera) -->
  <rect x="3" y="0" width="10" height="1" fill="#334488"/>
  <rect x="3" y="1" width="10" height="3" fill="#4466AA"/>
  <rect x="3" y="4" width="10" height="1" fill="#334488"/>
  <rect x="6" y="1" width="4" height="3" fill="#5588CC"/>
  <!-- Belt and legs -->
  <rect x="5" y="19" width="6" height="1" fill="#7A5030"/>
  <rect x="5" y="20" width="6" height="7" fill="#4A4A5E"/>
  <rect x="7" y="21" width="1" height="5" fill="#3E3E50"/>
  <rect x="4" y="27" width="4" height="5" fill="#363646"/>
  <rect x="8" y="27" width="4" height="5" fill="#363646"/>
  <rect x="4" y="31" width="4" height="1" fill="#2A2A3A"/>
  <rect x="8" y="31" width="4" height="1" fill="#2A2A3A"/>
</svg>
