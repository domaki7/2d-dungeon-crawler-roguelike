<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Motion lines above -->
  <rect x="3" y="0" width="1" height="2" fill="#AAAACC"/>
  <rect x="12" y="0" width="1" height="2" fill="#AAAACC"/>
  <!-- Helmet leaning forward -->
  <rect x="6" y="2" width="4" height="1" fill="#505064"/>
  <rect x="5" y="3" width="6" height="1" fill="#505064"/>
  <rect x="4" y="4" width="8" height="4" fill="#505064"/>
  <rect x="5" y="8" width="6" height="1" fill="#505064"/>
  <rect x="5" y="4" width="3" height="1" fill="#6E6E82"/>
  <rect x="4" y="6" width="8" height="1" fill="#1E1E32"/>
  <rect x="6" y="6" width="1" height="1" fill="#88CCFF"/>
  <rect x="9" y="6" width="1" height="1" fill="#88CCFF"/>
  <!-- Face -->
  <rect x="5" y="9" width="6" height="2" fill="#E8B888"/>
  <rect x="6" y="10" width="4" height="1" fill="#D4A070"/>
  <!-- Armor body lunging -->
  <rect x="5" y="11" width="6" height="8" fill="#6E6E82"/>
  <rect x="6" y="14" width="4" height="4" fill="#2844A0"/>
  <rect x="7" y="14" width="2" height="4" fill="#3858C0"/>
  <!-- Arms pushing shield forward -->
  <rect x="2" y="12" width="3" height="4" fill="#5A5A6E"/>
  <rect x="11" y="12" width="3" height="4" fill="#5A5A6E"/>
  <rect x="2" y="16" width="2" height="1" fill="#D4A878"/>
  <rect x="12" y="16" width="2" height="1" fill="#D4A878"/>
  <!-- Shield extended further down -->
  <rect x="2" y="19" width="12" height="1" fill="#334488"/>
  <rect x="2" y="20" width="12" height="3" fill="#4466AA"/>
  <rect x="2" y="23" width="12" height="1" fill="#334488"/>
  <rect x="5" y="20" width="6" height="3" fill="#5588CC"/>
  <!-- Belt -->
  <rect x="5" y="19" width="6" height="1" fill="#7A5030"/>
  <!-- Legs -->
  <rect x="5" y="24" width="6" height="4" fill="#4A4A5E"/>
  <rect x="4" y="28" width="4" height="4" fill="#363646"/>
  <rect x="8" y="28" width="4" height="4" fill="#363646"/>
</svg>
