<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Hood (back view, bob) -->
  <rect x="6" y="1" width="4" height="1" fill="#2D6B3F"/>
  <rect x="5" y="2" width="6" height="1" fill="#2D6B3F"/>
  <rect x="4" y="3" width="8" height="5" fill="#2D6B3F"/>
  <rect x="5" y="8" width="6" height="1" fill="#2D6B3F"/>
  <rect x="5" y="3" width="3" height="1" fill="#3A8B52"/>
  <rect x="4" y="5" width="8" height="1" fill="#246B35"/>
  <!-- Back of neck -->
  <rect x="6" y="9" width="4" height="2" fill="#D4A070"/>
  <!-- Torso -->
  <rect x="5" y="11" width="6" height="9" fill="#5A3C24"/>
  <rect x="6" y="14" width="4" height="5" fill="#6B4C30"/>
  <rect x="7" y="14" width="2" height="5" fill="#7A5C3A"/>
  <!-- Arms -->
  <rect x="2" y="11" width="4" height="1" fill="#6B4C30"/>
  <rect x="2" y="12" width="4" height="1" fill="#5A3C24"/>
  <rect x="10" y="11" width="4" height="1" fill="#6B4C30"/>
  <rect x="10" y="12" width="4" height="1" fill="#5A3C24"/>
  <rect x="2" y="13" width="3" height="6" fill="#5A3C24"/>
  <rect x="11" y="13" width="3" height="6" fill="#5A3C24"/>
  <rect x="2" y="19" width="2" height="1" fill="#D4A878"/>
  <rect x="12" y="19" width="2" height="1" fill="#D4A878"/>
  <!-- Bow on back -->
  <rect x="13" y="11" width="1" height="10" fill="#7A5030"/>
  <rect x="14" y="11" width="1" height="1" fill="#C8C8D8"/>
  <rect x="14" y="20" width="1" height="1" fill="#C8C8D8"/>
  <!-- Belt -->
  <rect x="5" y="20" width="6" height="1" fill="#4A3020"/>
  <!-- Pants -->
  <rect x="5" y="21" width="6" height="7" fill="#4A3828"/>
  <rect x="7" y="22" width="1" height="5" fill="#3A2818"/>
