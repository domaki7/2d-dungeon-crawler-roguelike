<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Frame 1: Neutral / passing (side view, facing right) -->
  <!-- Hood top -->
  <rect x="5" y="0" width="5" height="1" fill="#7A1818"/>
  <rect x="4" y="1" width="7" height="1" fill="#7A1818"/>
  <rect x="4" y="2" width="7" height="2" fill="#8B2020"/>
  <!-- Hood side -->
  <rect x="4" y="4" width="2" height="3" fill="#7A1818"/>
  <rect x="4" y="7" width="1" height="1" fill="#8B2020"/>
  <!-- Face side profile -->
  <rect x="6" y="4" width="4" height="4" fill="#E8B888"/>
  <rect x="7" y="5" width="3" height="2" fill="#D4A070"/>
  <!-- Eye -->
  <rect x="9" y="5" width="1" height="1" fill="#1E1E32"/>
  <rect x="9" y="5" width="1" height="1" fill="#AAEEFF" opacity="0.6"/>
  <!-- Nose -->
  <rect x="10" y="6" width="1" height="1" fill="#D4A070"/>
  <!-- Hood bottom -->
  <rect x="5" y="8" width="5" height="1" fill="#7A1818"/>
  <!-- Gold collar -->
  <rect x="5" y="9" width="5" height="1" fill="#DAA520"/>
  <!-- Robe body side -->
  <rect x="4" y="10" width="7" height="2" fill="#A03030"/>
  <rect x="5" y="12" width="5" height="4" fill="#8B2020"/>
  <rect x="6" y="12" width="3" height="4" fill="#A03030"/>
  <rect x="7" y="10" width="1" height="6" fill="#B8860B"/>
  <!-- Front arm neutral -->
  <rect x="10" y="10" width="2" height="1" fill="#8B2020"/>
  <rect x="10" y="11" width="2" height="3" fill="#7A1818"/>
  <rect x="10" y="14" width="2" height="1" fill="#D4A878"/>
  <!-- Robe lower -->
  <rect x="4" y="16" width="7" height="2" fill="#8B2020"/>
  <rect x="5" y="18" width="5" height="4" fill="#6A1818"/>
  <rect x="7" y="16" width="1" height="6" fill="#7A1818"/>
  <!-- Gold hem -->
  <rect x="5" y="22" width="5" height="1" fill="#DAA520"/>
  <!-- Robe bottom -->
  <rect x="4" y="23" width="7" height="4" fill="#6A1818"/>
  <rect x="4" y="27" width="7" height="1" fill="#B8860B"/>
  <!-- Feet together -->
  <rect x="5" y="28" width="3" height="2" fill="#2A2A3A"/>
  <rect x="8" y="28" width="3" height="2" fill="#2A2A3A"/>
  <rect x="5" y="30" width="3" height="1" fill="#1E1E2E"/>
  <rect x="8" y="30" width="3" height="1" fill="#1E1E2E"/>
  <!-- Staff -->
  <rect x="12" y="2" width="1" height="14" fill="#4A3020"/>
  <rect x="13" y="4" width="1" height="10" fill="#3A2818"/>
  <rect x="11" y="0" width="3" height="1" fill="#DAA520"/>
  <rect x="11" y="1" width="3" height="2" fill="#FFD700"/>
  <rect x="12" y="1" width="1" height="1" fill="#FFEC80"/>
</svg>