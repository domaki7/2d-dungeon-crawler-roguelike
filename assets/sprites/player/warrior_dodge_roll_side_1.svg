<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Mid-roll - side view tucked ball -->
  <!-- Helmet -->
  <rect x="5" y="8" width="6" height="3" fill="#505064"/>
  <rect x="5" y="8" width="3" height="1" fill="#6E6E82"/>
  <rect x="5" y="10" width="6" height="1" fill="#1E1E32"/>
  <rect x="10" y="10" width="1" height="1" fill="#88CCFF"/>
  <!-- Armor body rolled -->
  <rect x="4" y="11" width="7" height="5" fill="#6E6E82"/>
  <rect x="7" y="13" width="3" height="2" fill="#2844A0"/>
  <rect x="8" y="13" width="2" height="2" fill="#3858C0"/>
  <!-- Arms wrapped -->
  <rect x="3" y="12" width="2" height="3" fill="#5A5A6E"/>
  <rect x="10" y="12" width="2" height="3" fill="#5A5A6E"/>
  <!-- Belt -->
  <rect x="4" y="16" width="7" height="1" fill="#7A5030"/>
  <!-- Legs tucked -->
  <rect x="4" y="17" width="3" height="4" fill="#3E3E50"/>
  <rect x="6" y="17" width="4" height="4" fill="#4A4A5E"/>
  <!-- Boots -->
  <rect x="4" y="21" width="3" height="2" fill="#2A2A3A"/>
  <rect x="6" y="21" width="4" height="2" fill="#363646"/>
</svg>
