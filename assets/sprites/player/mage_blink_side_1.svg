  <rect x="5" y="8" width="6" height="2" fill="#AA6060"/>
  <rect x="6" y="8" width="4" height="2" fill="#BB7070"/>
  <rect x="5" y="8" width="1" height="2" fill="#DDC070"/>
  <!-- Robe torso (faded with gaps) -->
