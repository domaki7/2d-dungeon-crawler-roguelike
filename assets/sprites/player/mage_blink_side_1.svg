  <rect x="9" y="10" width="2" height="4" fill="#AA6060"/>
  <rect x="6" y="11" width="4" height="3" fill="#BB7070"/>
  <rect x="5" y="15" width="6" height="3" fill="#AA6060"/>
  <rect x="6" y="15" width="4" height="3" fill="#BB7070"/>
