<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Recovery from roll - side view rising -->
  <!-- Helmet -->
  <rect x="6" y="4" width="4" height="1" fill="#505064"/>
  <rect x="5" y="5" width="6" height="3" fill="#505064"/>
  <rect x="5" y="5" width="3" height="1" fill="#6E6E82"/>
  <rect x="5" y="7" width="6" height="1" fill="#1E1E32"/>
  <rect x="10" y="7" width="1" height="1" fill="#88CCFF"/>
  <!-- Neck -->
  <rect x="8" y="8" width="2" height="1" fill="#D4A070"/>
  <!-- Armor body rising -->
  <rect x="5" y="9" width="5" height="7" fill="#6E6E82"/>
  <rect x="7" y="11" width="2" height="4" fill="#2844A0"/>
  <rect x="8" y="11" width="1" height="4" fill="#3858C0"/>
  <!-- Arms out for balance -->
  <rect x="3" y="10" width="3" height="5" fill="#5A5A6E"/>
  <rect x="9" y="10" width="3" height="5" fill="#5A5A6E"/>
  <rect x="3" y="15" width="2" height="1" fill="#D4A878"/>
  <rect x="10" y="15" width="2" height="1" fill="#D4A878"/>
  <!-- Belt -->
  <rect x="5" y="16" width="5" height="1" fill="#7A5030"/>
  <!-- Legs -->
  <rect x="4" y="17" width="3" height="7" fill="#3E3E50"/>
  <rect x="6" y="17" width="3" height="7" fill="#4A4A5E"/>
  <!-- Boots -->
  <rect x="3" y="24" width="4" height="4" fill="#2A2A3A"/>
  <rect x="6" y="24" width="4" height="4" fill="#363646"/>
  <rect x="6" y="28" width="4" height="1" fill="#2A2A3A"/>
</svg>
