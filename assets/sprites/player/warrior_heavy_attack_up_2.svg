<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Sword high overhead follow-through -->
  <rect x="6" y="0" width="3" height="1" fill="#B8B8CC"/>
  <rect x="7" y="0" width="1" height="1" fill="#A0A0B8"/>
  <rect x="9" y="0" width="5" height="1" fill="#7A7A8E"/>
  <rect x="10" y="1" width="2" height="2" fill="#6B4423"/>
  <!-- Helmet (back view) -->
  <rect x="6" y="2" width="4" height="1" fill="#505064"/>
  <rect x="5" y="3" width="6" height="1" fill="#505064"/>
  <rect x="4" y="4" width="8" height="4" fill="#505064"/>
  <rect x="5" y="8" width="6" height="1" fill="#505064"/>
  <rect x="5" y="4" width="3" height="1" fill="#6E6E82"/>
  <rect x="4" y="6" width="8" height="1" fill="#3A3A4E"/>
  <!-- Neck -->
  <rect x="6" y="9" width="4" height="2" fill="#D4A070"/>
  <!-- Body armor (back) -->
  <rect x="5" y="11" width="6" height="8" fill="#5A5A6E"/>
  <rect x="6" y="14" width="4" height="4" fill="#1E3878"/>
  <rect x="7" y="14" width="2" height="4" fill="#2844A0"/>
  <!-- Shoulders -->
  <rect x="2" y="11" width="4" height="1" fill="#8888A0"/>
  <rect x="2" y="12" width="4" height="1" fill="#6E6E82"/>
  <rect x="10" y="11" width="4" height="1" fill="#8888A0"/>
  <rect x="10" y="12" width="4" height="1" fill="#6E6E82"/>
  <!-- Arms fully extended up -->
  <rect x="2" y="13" width="3" height="5" fill="#5A5A6E"/>
  <rect x="11" y="2" width="3" height="6" fill="#5A5A6E"/>
  <rect x="2" y="18" width="2" height="1" fill="#D4A878"/>
  <rect x="12" y="2" width="2" height="1" fill="#D4A878"/>
  <!-- Belt -->
  <rect x="5" y="19" width="6" height="1" fill="#7A5030"/>
  <!-- Legs -->
  <rect x="5" y="20" width="6" height="7" fill="#4A4A5E"/>
  <rect x="7" y="21" width="1" height="5" fill="#3E3E50"/>
  <!-- Boots -->
  <rect x="4" y="27" width="4" height="5" fill="#363646"/>
  <rect x="8" y="27" width="4" height="5" fill="#363646"/>
  <rect x="4" y="31" width="4" height="1" fill="#2A2A3A"/>
  <rect x="8" y="31" width="4" height="1" fill="#2A2A3A"/>
</svg>
