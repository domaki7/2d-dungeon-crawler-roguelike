  <rect x="2" y="6" width="1" height="1" fill="#AAEEFF"/>
  <rect x="14" y="3" width="1" height="1" fill="#AAEEFF"/>
  <rect x="1" y="19" width="1" height="1" fill="#AAEEFF"/>
