<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- hat -->
  <rect x="4" y="2" width="8" height="2" fill="#4B0082"/>
  <rect x="3" y="4" width="10" height="3" fill="#4B0082"/>
  <rect x="5" y="3" width="6" height="1" fill="#6A0DAD"/>
  <!-- hat brim -->
  <rect x="2" y="7" width="12" height="1" fill="#3B0066"/>
  <!-- face -->
  <rect x="5" y="8" width="6" height="5" fill="#DEB887"/>
  <rect x="6" y="9" width="1" height="1" fill="#2C1810"/>
  <rect x="9" y="9" width="1" height="1" fill="#2C1810"/>
  <rect x="6" y="11" width="4" height="1" fill="#C19A6B"/>
  <!-- beard -->
  <rect x="5" y="12" width="6" height="3" fill="#D3D3D3"/>
  <rect x="6" y="15" width="4" height="1" fill="#C0C0C0"/>
  <!-- robe -->
  <rect x="4" y="13" width="8" height="10" fill="#4B0082"/>
  <rect x="5" y="14" width="6" height="8" fill="#5B1092"/>
  <!-- robe detail -->
  <rect x="7" y="14" width="2" height="8" fill="#6A0DAD"/>
  <!-- belt -->
  <rect x="4" y="19" width="8" height="1" fill="#FFD700"/>
  <rect x="7" y="19" width="2" height="1" fill="#DAA520"/>
  <!-- arms -->
  <rect x="3" y="15" width="1" height="5" fill="#4B0082"/>
  <rect x="12" y="15" width="1" height="5" fill="#4B0082"/>
  <!-- hands -->
  <rect x="3" y="20" width="1" height="1" fill="#DEB887"/>
  <rect x="12" y="20" width="1" height="1" fill="#DEB887"/>
  <!-- feet -->
  <rect x="5" y="23" width="2" height="2" fill="#3B0066"/>
  <rect x="9" y="23" width="2" height="2" fill="#3B0066"/>
</svg>
