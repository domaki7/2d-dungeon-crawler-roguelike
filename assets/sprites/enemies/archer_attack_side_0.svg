<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Skull side -->
  <rect x="5" y="1" width="5" height="1" fill="#D0D0C8"/>
  <rect x="4" y="2" width="7" height="4" fill="#D0D0C8"/>
  <rect x="5" y="6" width="5" height="1" fill="#D0D0C8"/>
  <rect x="8" y="4" width="2" height="1" fill="#1E1E1E"/>
  <rect x="7" y="6" width="3" height="1" fill="#A0A098"/>
  <rect x="6" y="7" width="2" height="1" fill="#B8B8B0"/>
  <!-- Ribcage -->
  <rect x="5" y="8" width="5" height="5" fill="#D0D0C8"/>
  <rect x="6" y="9" width="1" height="3" fill="#A0A098"/>
  <rect x="8" y="9" width="1" height="3" fill="#A0A098"/>
  <rect x="6" y="13" width="2" height="3" fill="#B8B8B0"/>
  <!-- Arm raised back -->
  <rect x="2" y="5" width="2" height="4" fill="#B8B8B0"/>
  <!-- Weapon raised behind -->
  <rect x="1" y="1" width="1" height="4" fill="#A0A0A0"/>
  <rect x="0" y="5" width="3" height="1" fill="#8B7355"/>
  <!-- Pelvis + legs -->
  <rect x="5" y="16" width="5" height="2" fill="#B8B8B0"/>
  <rect x="5" y="18" width="3" height="6" fill="#D0D0C8"/>
  <rect x="6" y="20" width="1" height="3" fill="#A0A098"/>
  <rect x="4" y="24" width="4" height="2" fill="#B8B8B0"/>
</svg>
