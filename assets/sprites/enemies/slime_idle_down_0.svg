<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Body top -->
  <rect x="6" y="8" width="4" height="1" fill="#66BB6A"/>
  <rect x="5" y="9" width="6" height="1" fill="#66BB6A"/>
  <rect x="4" y="10" width="8" height="2" fill="#4CAF50"/>
  <!-- Eyes -->
  <rect x="5" y="11" width="2" height="1" fill="#1E1E1E"/>
  <rect x="9" y="11" width="2" height="1" fill="#1E1E1E"/>
  <!-- Body middle -->
  <rect x="3" y="12" width="10" height="2" fill="#4CAF50"/>
  <!-- Belly highlight -->
  <rect x="6" y="13" width="4" height="2" fill="#81C784"/>
  <!-- Mouth -->
  <rect x="7" y="14" width="2" height="1" fill="#388E3C"/>
  <!-- Body lower -->
  <rect x="3" y="14" width="10" height="4" fill="#4CAF50"/>
  <rect x="6" y="14" width="4" height="2" fill="#81C784"/>
  <!-- Body base -->
  <rect x="4" y="18" width="8" height="2" fill="#4CAF50"/>
  <rect x="5" y="20" width="6" height="1" fill="#388E3C"/>
  <!-- Side shading -->
  <rect x="3" y="13" width="1" height="4" fill="#388E3C"/>
  <rect x="12" y="13" width="1" height="4" fill="#388E3C"/>
  <!-- Bottom shading -->
  <rect x="4" y="19" width="1" height="1" fill="#388E3C"/>
  <rect x="11" y="19" width="1" height="1" fill="#388E3C"/>
</svg>
