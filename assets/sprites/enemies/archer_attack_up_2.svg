<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Skull back -->
  <rect x="5" y="2" width="6" height="1" fill="#B8B8B0"/>
  <rect x="4" y="3" width="8" height="4" fill="#B8B8B0"/>
  <rect x="5" y="7" width="6" height="1" fill="#B8B8B0"/>
  <rect x="5" y="3" width="6" height="1" fill="#A0A098"/>
  <rect x="7" y="8" width="2" height="1" fill="#A0A098"/>
  <!-- Ribcage -->
  <rect x="5" y="9" width="6" height="5" fill="#B8B8B0"/>
  <rect x="7" y="10" width="2" height="3" fill="#A0A098"/>
  <rect x="7" y="14" width="2" height="2" fill="#A0A098"/>
  <!-- Arms follow through -->
  <rect x="3" y="9" width="2" height="1" fill="#B8B8B0"/>
  <rect x="2" y="10" width="2" height="5" fill="#A0A098"/>
  <rect x="11" y="9" width="2" height="1" fill="#B8B8B0"/>
  <rect x="12" y="10" width="2" height="5" fill="#A0A098"/>
  <!-- Weapon extended up -->
  <rect x="12" y="0" width="1" height="5" fill="#A0A0A0"/>
  <rect x="11" y="5" width="3" height="1" fill="#8B7355"/>
  <!-- Pelvis + legs -->
  <rect x="5" y="16" width="6" height="2" fill="#A0A098"/>
  <rect x="5" y="18" width="3" height="6" fill="#B8B8B0"/>
  <rect x="8" y="18" width="3" height="6" fill="#B8B8B0"/>
  <rect x="4" y="24" width="4" height="2" fill="#A0A098"/>
  <rect x="8" y="24" width="4" height="2" fill="#A0A098"/>
</svg>
