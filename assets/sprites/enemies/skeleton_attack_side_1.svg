  <rect x="5" y="3" width="7" height="4" fill="#D0D0C8"/>
  <rect x="6" y="7" width="5" height="1" fill="#D0D0C8"/>
  <rect x="9" y="5" width="2" height="1" fill="#1E1E1E"/>
  <rect x="8" y="7" width="3" height="1" fill="#A0A098"/>
