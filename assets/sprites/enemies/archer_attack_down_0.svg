<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Skull -->
  <rect x="5" y="1" width="6" height="1" fill="#D0D0C8"/>
  <rect x="4" y="2" width="8" height="4" fill="#D0D0C8"/>
  <rect x="5" y="6" width="6" height="1" fill="#D0D0C8"/>
  <rect x="5" y="4" width="2" height="1" fill="#1E1E1E"/>
  <rect x="9" y="4" width="2" height="1" fill="#1E1E1E"/>
  <rect x="7" y="5" width="2" height="1" fill="#A0A098"/>
  <rect x="6" y="6" width="4" height="1" fill="#A0A098"/>
  <rect x="7" y="7" width="2" height="1" fill="#B8B8B0"/>
  <!-- Ribcage -->
  <rect x="5" y="8" width="6" height="5" fill="#D0D0C8"/>
  <rect x="6" y="9" width="1" height="3" fill="#A0A098"/>
  <rect x="9" y="9" width="1" height="3" fill="#A0A098"/>
  <rect x="7" y="13" width="2" height="3" fill="#B8B8B0"/>
  <!-- Right arm raised (wind up) -->
  <rect x="11" y="6" width="2" height="1" fill="#D0D0C8"/>
  <rect x="12" y="4" width="2" height="3" fill="#B8B8B0"/>
  <!-- Left arm -->
  <rect x="3" y="8" width="2" height="1" fill="#D0D0C8"/>
  <rect x="2" y="9" width="2" height="5" fill="#B8B8B0"/>
  <!-- Weapon raised -->
  <rect x="13" y="0" width="1" height="4" fill="#A0A0A0"/>
  <rect x="12" y="4" width="3" height="1" fill="#8B7355"/>
  <!-- Pelvis + legs -->
  <rect x="5" y="16" width="6" height="2" fill="#B8B8B0"/>
  <rect x="5" y="18" width="3" height="6" fill="#D0D0C8"/>
  <rect x="8" y="18" width="3" height="6" fill="#D0D0C8"/>
  <rect x="4" y="24" width="4" height="2" fill="#B8B8B0"/>
  <rect x="8" y="24" width="4" height="2" fill="#B8B8B0"/>
</svg>
