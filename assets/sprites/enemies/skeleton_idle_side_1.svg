<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 32" shape-rendering="crispEdges">
  <!-- Skull side -->
  <rect x="6" y="2" width="5" height="1" fill="#D0D0C8"/>
  <rect x="5" y="3" width="7" height="4" fill="#D0D0C8"/>
  <rect x="6" y="7" width="5" height="1" fill="#D0D0C8"/>
  <!-- Eye -->
  <rect x="9" y="5" width="2" height="1" fill="#1E1E1E"/>
  <!-- Jaw -->
  <rect x="8" y="7" width="3" height="1" fill="#A0A098"/>
  <!-- Neck -->
  <rect x="7" y="8" width="2" height="1" fill="#B8B8B0"/>
  <!-- Ribcage side -->
  <rect x="6" y="9" width="5" height="5" fill="#D0D0C8"/>
  <rect x="7" y="10" width="1" height="3" fill="#A0A098"/>
  <rect x="9" y="10" width="1" height="3" fill="#A0A098"/>
  <!-- Spine -->
  <rect x="7" y="14" width="2" height="3" fill="#B8B8B0"/>
  <!-- Arm (front) -->
  <rect x="10" y="10" width="2" height="5" fill="#B8B8B0"/>
  <rect x="10" y="15" width="2" height="1" fill="#A0A098"/>
  <!-- Pelvis -->
  <rect x="6" y="17" width="5" height="2" fill="#B8B8B0"/>
  <!-- Legs -->
  <rect x="6" y="19" width="3" height="6" fill="#D0D0C8"/>
  <rect x="7" y="21" width="1" height="3" fill="#A0A098"/>
  <!-- Feet -->
  <rect x="5" y="25" width="4" height="2" fill="#B8B8B0"/>
  <!-- Weapon -->
  <rect x="12" y="9" width="1" height="6" fill="#8B7355"/>
  <rect x="11" y="8" width="3" height="1" fill="#8B7355"/>
  <rect x="12" y="4" width="1" height="4" fill="#A0A0A0"/>
</svg>
