<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- coin body -->
  <rect x="5" y="3" width="6" height="1" fill="#DAA520"/>
  <rect x="4" y="4" width="8" height="8" fill="#DAA520"/>
  <rect x="5" y="12" width="6" height="1" fill="#DAA520"/>
  <!-- highlight -->
  <rect x="5" y="4" width="2" height="1" fill="#FFD700"/>
  <rect x="4" y="5" width="1" height="2" fill="#FFD700"/>
  <!-- shadow -->
  <rect x="11" y="9" width="1" height="2" fill="#B8860B"/>
  <rect x="9" y="12" width="2" height="1" fill="#B8860B"/>
  <!-- star emblem -->
  <rect x="7" y="6" width="2" height="1" fill="#FFEE88"/>
  <rect x="6" y="7" width="4" height="2" fill="#FFEE88"/>
  <rect x="7" y="9" width="2" height="1" fill="#FFEE88"/>
</svg>
