<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- outer ring -->
  <rect x="5" y="2" width="6" height="2" fill="#b0b8c8"/>
  <rect x="3" y="4" width="2" height="2" fill="#b0b8c8"/>
  <rect x="11" y="4" width="2" height="2" fill="#b0b8c8"/>
  <rect x="2" y="6" width="2" height="4" fill="#b0b8c8"/>
  <rect x="12" y="6" width="2" height="4" fill="#b0b8c8"/>
  <rect x="3" y="10" width="2" height="2" fill="#b0b8c8"/>
  <rect x="11" y="10" width="2" height="2" fill="#b0b8c8"/>
  <rect x="5" y="12" width="6" height="2" fill="#b0b8c8"/>
  <!-- inner dark -->
  <rect x="5" y="4" width="6" height="1" fill="#1a1a2e"/>
