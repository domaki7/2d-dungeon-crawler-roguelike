<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- body -->
  <rect x="2" y="8" width="12" height="6" fill="#8B5E3C"/>
  <rect x="3" y="9" width="10" height="4" fill="#6B3410"/>
  <!-- lid open (tilted back) -->
  <rect x="2" y="2" width="12" height="3" fill="#A0522D"/>
  <rect x="3" y="3" width="10" height="1" fill="#8B4513"/>
  <!-- interior visible -->
  <rect x="3" y="5" width="10" height="3" fill="#1A1A2E"/>
  <rect x="5" y="6" width="2" height="1" fill="#FFD700"/>
  <rect x="9" y="6" width="2" height="1" fill="#FFD700"/>
  <!-- metal bands -->
  <rect x="2" y="8" width="12" height="1" fill="#808080"/>
  <rect x="2" y="12" width="12" height="1" fill="#808080"/>
  <!-- corners -->
  <rect x="2" y="2" width="1" height="12" fill="#5C3317"/>
  <rect x="13" y="2" width="1" height="12" fill="#5C3317"/>
</svg>
