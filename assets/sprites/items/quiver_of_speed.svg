<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- quiver body -->
  <rect x="5" y="2" width="6" height="12" fill="#6B4C30"/>
  <rect x="6" y="3" width="4" height="10" fill="#8B6340"/>
  <!-- arrows sticking out -->
  <rect x="6" y="0" width="1" height="3" fill="#7A5030"/>
  <rect x="8" y="0" width="1" height="3" fill="#7A5030"/>
  <rect x="10" y="1" width="1" height="2" fill="#7A5030"/>
  <!-- arrowheads -->
  <rect x="6" y="0" width="1" height="1" fill="#A8A8A8"/>
  <rect x="8" y="0" width="1" height="1" fill="#A8A8A8"/>
  <rect x="10" y="1" width="1" height="1" fill="#A8A8A8"/>
  <!-- strap -->
  <rect x="4" y="5" width="1" height="1" fill="#4A3020"/>
  <rect x="11" y="5" width="1" height="1" fill="#4A3020"/>
  <rect x="4" y="9" width="1" height="1" fill="#4A3020"/>
  <rect x="11" y="9" width="1" height="1" fill="#4A3020"/>
  <!-- speed lines -->
  <rect x="12" y="7" width="2" height="1" fill="#44CC66"/>
  <rect x="13" y="5" width="1" height="1" fill="#44CC66"/>
  <rect x="13" y="9" width="1" height="1" fill="#44CC66"/>
</svg>
