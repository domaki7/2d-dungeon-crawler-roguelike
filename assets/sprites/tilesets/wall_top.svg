  <!-- brick lines -->
  <rect x="0" y="7" width="16" height="1" fill="#3e3958"/>
  <rect x="7" y="0" width="1" height="7" fill="#3e3958"/>
  <rect x="3" y="8" width="1" height="8" fill="#3e3958"/>
  <rect x="11" y="8" width="1" height="8" fill="#3e3958"/>
