<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- wall front face (visible below wall_top, gives depth) -->
  <rect width="16" height="16" fill="#2e2945"/>
  <!-- brick lines -->
  <rect x="0" y="5" width="16" height="1" fill="#262240"/>
  <rect x="0" y="11" width="16" height="1" fill="#262240"/>
  <rect x="4" y="0" width="1" height="5" fill="#262240"/>
  <rect x="12" y="0" width="1" height="5" fill="#262240"/>
  <rect x="8" y="6" width="1" height="5" fill="#262240"/>
  <rect x="0" y="6" width="1" height="5" fill="#262240"/>
  <rect x="4" y="12" width="1" height="4" fill="#262240"/>
  <rect x="12" y="12" width="1" height="4" fill="#262240"/>
  <!-- shadow at top -->
  <rect x="0" y="0" width="16" height="2" fill="#252040"/>
</svg>
